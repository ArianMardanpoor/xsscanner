# Headers added to avoid WAF fingerprinting of nuclei's default request signature (see false-negative investigation, July 2026)
id: x9-v2-reflection-matcher

info:
  name: X9 v2 Reflection Matcher (Randomized)
  author: arian
  severity: info
  description: Detects randomized reflection patterns from x9 v2 to bypass WAF signatures.
  tags: reflection, xss, bypass

http:
  - method: GET
    path:
      - "{{BaseURL}}"
    headers:
      User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36"
      Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8"
      Accept-Language: "en-US,en;q=0.9"

    matchers-condition: or
    matchers:
      - type: regex
        part: body
        regex:
          - "x9[a-z]{3}['\"`\\;<{]" # شناسایی الگوهای x9 + 3 حرف رندوم + کاراکتر بریک

    extractors:
      - type: regex
        part: body
        regex:
          - "x9[a-z]{3}['\"`\\;<{]"
        group: 0

  - raw:
      - |
        POST {{Path}} HTTP/1.1
        Host: {{Host}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
        Accept-Language: en-US,en;q=0.9
        Content-Type: application/x-www-form-urlencoded

        {{query}}

    matchers-condition: or
    matchers:
      - type: regex
        part: body
        regex:
          - "x9[a-z]{3}['\"`\\;<{]"

    extractors:
      - type: regex
        part: body
        regex:
          - "x9[a-z]{3}['\"`\\;<{]"
        group: 0